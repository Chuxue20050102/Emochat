services:
  mysql:
    image: mysql:8.0
    container_name: emochat-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: emochat
      MYSQL_USER: emochat
      MYSQL_PASSWORD: emochat123
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123456"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build:
      context: ./backend_fastapi
      dockerfile: Dockerfile
    container_name: emochat-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend_fastapi/.env
    environment:
      EMOCHAT_DATABASE_URL: mysql+pymysql://emochat:emochat123@mysql:3306/emochat?charset=utf8mb4
      EMOCHAT_REDIS_HOST: redis
      EMOCHAT_REDIS_PORT: 6379
      EMOCHAT_REDIS_DB: 1
      HTTP_PROXY: http://host.docker.internal:7897
      HTTPS_PROXY: http://host.docker.internal:7897
      NO_PROXY: localhost,127.0.0.1,redis,mysql,host.docker.internal
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: emochat-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
